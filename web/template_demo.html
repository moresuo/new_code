<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件包含 — LFI演示</title>
    <link rel="stylesheet" href="css/cyberpunk.css">
</head>
<body>
    <header>
        <h1>文件包含 (LFI)</h1>
        <p class="note">本地文件包含漏洞演示 — page参数直接拼入include语句</p>
    </header>
    <nav class="nav_menu"></nav>
    <div class="container">
        <div class="tips">
            <h3>常用测试路径（会自动追加 .php 后缀）：</h3>
            <code>../tools/database.config   — 数据库配置（注意：无.php后缀时不追加）</code>
            <code>../tools/DB                — DB类源码</code>
            <code>../tools/cors              — CORS配置</code>
        </div>
        <div class="section">
            <h2>页面包含测试</h2>
            <div class="form-group">
                <label>模板页面 (page参数，自动追加.php后缀)：</label>
                <input type="text" id="pageInput" placeholder="例：../tools/DB" value="../tools/DB">
            </div>
            <button class="btn include-btn">直接请求（新窗口）</button>
            <button class="btn cyan preview-btn">AJAX预览内容</button>
        </div>
        <div class="section">
            <h2>包含结果</h2>
            <div class="output-box" id="resultArea">点击"预览"按钮查看文件包含结果...（注意：PHP代码会被执行，源码可能不显示）</div>
        </div>
    </div>
    <footer>版权所有 © 2024 新闻网站 | LFI漏洞演示</footer>

    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/config.js"></script>
<script src="./js/utils.js"></script>
    <script>
        $(function(){
            var cookie = cookieToJson(document.cookie);
            $(".nav_menu").html(getNavHtml(cookie));
            $(".include-btn").click(function(){
                var p = $("#pageInput").val();
                if (!p) { alert("请输入page参数"); return; }
                window.open(API_BASE + "/template.php?page=" + encodeURIComponent(p), "_blank");
            });
            $(".preview-btn").click(function(){
                var p = $("#pageInput").val();
                if (!p) { alert("请输入page参数"); return; }
                $.ajax({
                    url: API_BASE + "/template.php",
                    type: "GET",
                    data: { page: p },
                    success: function(data){
                        $("#resultArea").text(data);
                    },
                    error: function(r){
                        $("#resultArea").text("请求失败: PHP执行错误或文件不存在，请在新窗口查看错误详情");
                    }
                });
            });
        });
    </script>
</html>
