<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码</title>
    <link rel="stylesheet" href="css/cyberpunk.css">
</head>

<body>
    <header>
        <h1>找回密码</h1>
        <p>通过注册邮箱重置您的密码</p>
    </header>
    <div class="container" id="step1">
        <form>
            <p>请输入您的注册邮箱，我们将发送重置密码的链接到您的邮箱。</p>
            <label for="email">邮箱：</label>
            <input type="email" id="email" name="email" required>
            <input type="button" value="提交" onclick="submitEmail()">
        </form>
    </div>
    <div class="container" id="step2" style="display: none;">
        <form>
            <label for="code">验证码：</label>
            <input type="text" id="code" name="code" required>
            <input type="button" value="验证" onclick="verifyCode()">
        </form>
    </div>
    <div class="container" id="step3" style="display: none;">
        <form>
            <label for="password">新密码：</label>
            <input type="password" id="password" name="password" required>
            <label for="confirm_password">确认新密码：</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <input type="button" value="重置密码" onclick="resetPassword()">
        </form>
    </div>
    <footer>
        <p>版权所有 © 2024 新闻网站</p>
    </footer>
</body>
<script src="./js/jquery-3.7.1.min.js"></script>
<script src="./js/config.js"></script>
<script src="./js/utils.js"></script>


<script>
    $("#step1").show();
    $("#step2").hide();
    $("#step3").hide();
    let uid;

    function submitEmail(){
        $.ajax({
                url: API_BASE + "/submitEmail.php",
                type: "GET",
                xhrFields: { // AJAX 携带cookie !!!
                    withCredentials: true,
                },
                data: {
                    email: $("#email").val()
                },
                dataType: "json",
                success: (response) => {
                    if (response.status == 200) {
                        alert(response.msg)
                        $("#step1").hide();
                        $("#step2").show();
                        $("#step3").hide();
                    } else {
                        alert(response.msg)
                    }
                },
                error: (response) => {
                    console.log(response);
                }
            })
    }

    function verifyCode() {
        $.ajax({
                url: API_BASE + "/verifyCode.php",
                type: "GET",
                xhrFields: { // AJAX 携带cookie !!!
                    withCredentials: true,
                },
                data: {
                    email: $("#email").val(),
                    authcode : $("#code").val()
                },
                dataType: "json",
                success: (response) => {
                    if (response.status == 200) {
                        alert(response.msg)
                        uid = response.uid
                        $("#step1").hide();
                        $("#step2").hide();
                        $("#step3").show();
                    } else {
                        alert(response.msg)
                    }
                },
                error: (response) => {
                    console.log(response);
                }
            })
    }

    function resetPassword(){
        $.ajax({
                url: API_BASE + "/resetPassword.php",
                type: "POST",
                xhrFields: { // AJAX 携带cookie !!!
                    withCredentials: true,
                },
                data: {
                    uid:uid,
                    password : $("#password").val(),
                    passwordtoo: $("#confirm_password").val()
                },
                dataType: "json",
                success: (response) => {
                    if (response.status == 200) {
                        alert(response.msg)
                        location = "login.html"
                    } else {
                        alert(response.msg)
                    }
                },
                error: (response) => {
                    console.log(response);
                }
            })
    }

</script>

</html>
