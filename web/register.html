<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="stylesheet" href="css/cyberpunk.css">
</head>

<body>
    <header>
        <h1>创建账户</h1>
        <p>加入我们，开始探索</p>
    </header>
    <div class="container">
        <form action="#" method="post">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>

            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>

            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>

            <label for="confirm_password">确认密码</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required>

            <div class="captcha">
                <label for="captcha">验证码</label>
                <img id="captcha" alt="验证码" title="点击刷新验证码">
            </div>
            <input type="text" id="captcha_code" name="captcha" placeholder="输入验证码" required>

            <input type="button" class="register" value="注 册">

            <p>已经有账户？<a href="login.html">立即登录</a></p>
        </form>
    </div>
    <footer>
        <p>版权所有 © 2024 新闻网站</p>
    </footer>
</body>
<script src="./js/jquery-3.7.1.min.js"></script>
<script src="./js/config.js"></script>
<script src="./js/utils.js"></script>
<script>
    $(function () {
        $("#captcha").attr("src", API_BASE + "/captcha.php");
        $("#captcha").click(function () {
            $("#captcha").attr("src", API_BASE + "/captcha.php?t=" + Math.random())
        })
        $(".register").click(function () {
            $.ajax({
                url: API_BASE + "/register.php",
                type: "POST",
                xhrFields: { // AJAX 携带cookie !!!
                    withCredentials: true,
                },
                data: {
                    username: $("#username").val(),
                    email: $("#email").val(),
                    password: $("#password").val(),
                    passwordtoo: $("#confirm_password").val(),
                    captcha: $("#captcha_code").val()
                },
                dataType: "json",
                success: (response) => {
                    if (response.status == 200) {
                        alert(response.msg)
                        setTimeout(function(){ location = "login.html"; }, 1500)
                    } else {
                        alert(response.msg)
                    }
                },
                error: (response) => {
                    console.log(response)
                }
            })
        })
    })
</script>

</html>
